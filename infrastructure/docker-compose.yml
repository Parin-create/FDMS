# FDMS local orchestration: PostgreSQL + FastAPI backend + React frontend.
# Run from the repository root:  docker compose -f infrastructure/docker-compose.yml up --build
name: fdms

services:
  db:
    image: postgres:16-alpine
    container_name: fdms-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fdms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fdms}
      POSTGRES_DB: ${POSTGRES_DB:-fdms}
    ports:
      - "5432:5432"
    volumes:
      - fdms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fdms} -d ${POSTGRES_DB:-fdms}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fdms-backend
    environment:
      APP_NAME: FDMS API
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-fdms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fdms}
      POSTGRES_DB: ${POSTGRES_DB:-fdms}
      # Local dev: use plaintext to the local db and apply migrations on startup.
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      RUN_MIGRATIONS: "true"
      # Azure integrations are inactive locally (they degrade gracefully).
      TELEMETRY_ENABLED: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health/live').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: fdms-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  fdms_pgdata:
    driver: local
