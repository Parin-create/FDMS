# Alembic configuration. The database URL is set programmatically in
# alembic/env.py from the application Settings (single source of truth),
# so sqlalchemy.url is intentionally left blank here.

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url =

[post_write_hooks]
# Auto-format generated migration scripts with ruff.
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
